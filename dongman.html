<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国漫追更</title>
    <link rel="shortcut icon" href="img/xininn.ico" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #000;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* 导航 */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-logo {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-logo span {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
        }

        .nav-time {
            font-size: 12px;
            color: #555;
            font-variant-numeric: tabular-nums;
        }

        /* 主布局 */
        .layout {
            display: flex;
            height: 100vh;
            padding-top: 52px;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 320px;
            min-width: 320px;
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 搜索区域 */
        .search-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .search-input-wrap {
            position: relative;
        }

        .search-input-wrap input {
            width: 100%;
            height: 44px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 0 44px 0 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input-wrap input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(255,255,255,0.08);
        }

        .search-input-wrap input::placeholder {
            color: #555;
        }

        .search-btn {
            position: absolute;
            right: 4px;
            top: 4px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 动漫列表 */
        .anime-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .anime-list::-webkit-scrollbar {
            width: 4px;
        }

        .anime-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .anime-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .anime-item:hover {
            background: rgba(255,255,255,0.04);
        }

        .anime-item.active {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .anime-item-cover {
            width: 48px;
            height: 64px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .anime-item-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .anime-item-cover .placeholder {
            font-size: 24px;
            opacity: 0.3;
        }

        .anime-item-info {
            flex: 1;
            min-width: 0;
        }

        .anime-item-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-item-ep {
            font-size: 12px;
            color: #888;
        }

        .anime-item-ep strong {
            color: #a855f7;
        }

        .anime-item-score {
            font-size: 11px;
            color: #fbbf24;
            font-weight: 600;
        }

        .anime-item-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #888;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .anime-item:hover .anime-item-delete {
            display: flex;
        }

        .anime-item-delete:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        /* 右侧主区域 */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .main::-webkit-scrollbar {
            width: 6px;
        }

        .main::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #444;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 18px;
            color: #666;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* 动漫详情 */
        .anime-detail {
            max-width: 800px;
        }

        .detail-header {
            display: flex;
            gap: 28px;
            margin-bottom: 32px;
        }

        .detail-cover {
            width: 200px;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .detail-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-cover .placeholder {
            font-size: 64px;
            opacity: 0.2;
        }

        .detail-info {
            flex: 1;
        }

        .detail-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .detail-original {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .detail-stats {
            display: flex;
            gap: 32px;
            margin-bottom: 24px;
        }

        .detail-stat {
            text-align: center;
        }

        .detail-stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .detail-stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .detail-tag {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.06);
            color: #aaa;
        }

        .detail-summary {
            font-size: 14px;
            color: #888;
            line-height: 1.8;
        }

        /* 集数列表 */
        .episodes-section {
            margin-top: 32px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
        }

        .episode-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: all 0.2s;
        }

        .episode-item:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .episode-item.watched {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
            color: #a855f7;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #555;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                min-width: auto;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.06);
            }

            .layout {
                flex-direction: column;
            }

            .detail-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .detail-cover {
                width: 160px;
                height: 224px;
            }

            .detail-stats {
                justify-content: center;
            }

            .detail-tags {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav class="nav">
        <div class="nav-left">
            <div class="nav-logo"><span>国漫追更</span></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="mac.html">Mac</a>
                <a href="dongman.html" class="active">国漫</a>
            </div>
        </div>
        <div class="nav-time" id="navTime"></div>
    </nav>

    <!-- 主布局 -->
    <div class="layout">
        <!-- 左侧 -->
        <aside class="sidebar">
            <div class="search-area">
                <div class="search-input-wrap">
                    <input type="text" id="searchInput" placeholder="输入动漫名称，回车添加..." autocomplete="off">
                    <button class="search-btn" id="searchBtn" onclick="addAnime()">+</button>
                </div>
            </div>
            <div class="anime-list" id="animeList">
                <!-- 动态生成 -->
            </div>
        </aside>

        <!-- 右侧 -->
        <main class="main" id="mainContent">
            <div class="empty-state">
                <div class="icon">🎬</div>
                <h3>输入动漫名称开始追更</h3>
                <p>支持自动获取封面、评分、简介等信息</p>
            </div>
        </main>
    </div>

    <!-- 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 数据存储
        let myAnimeList = JSON.parse(localStorage.getItem('myAnimeList') || '[]');
        let watchedEpisodes = JSON.parse(localStorage.getItem('watchedEpisodes') || '{}');
        let currentAnimeId = null;

        // 更新时间
        function updateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short', hour: '2-digit', minute: '2-digit' };
            document.getElementById('navTime').textContent = now.toLocaleString('zh-CN', options);
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 获取动漫信息（通过 Bangumi API）
        async function fetchAnimeInfo(name) {
            try {
                const response = await fetch(`https://api.bgm.tv/v0/search?keyword=${encodeURIComponent(name)}&type=2&limit=1`);
                if (!response.ok) throw new Error('网络错误');
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    const item = data.data[0];
                    return {
                        id: item.id,
                        name: item.name,
                        nameCn: item.name_cn || item.name,
                        cover: item.images ? item.images.large : '',
                        score: item.rating ? item.rating.score : 0,
                        summary: item.summary || '暂无简介',
                        tags: (item.tags || []).slice(0, 5).map(t => t.name),
                        epsCount: item.eps || 0,
                        airDate: item.air_date || '未知',
                        platform: 'Bangumi'
                    };
                }
                return null;
            } catch (e) {
                console.error('获取信息失败:', e);
                return null;
            }
        }

        // 添加动漫
        async function addAnime() {
            const input = document.getElementById('searchInput');
            const name = input.value.trim();
            if (!name) return;

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = '...';

            // 检查是否已添加
            if (myAnimeList.some(a => a.name === name)) {
                showToast('已经添加过这部动漫了');
                btn.disabled = false;
                btn.textContent = '+';
                return;
            }

            // 获取信息
            const info = await fetchAnimeInfo(name);
            
            if (info) {
                const anime = {
                    id: Date.now(),
                    ...info,
                    addedAt: new Date().toISOString()
                };
                myAnimeList.unshift(anime);
                saveData();
                renderList();
                selectAnime(anime.id);
                input.value = '';
                showToast(`已添加「${info.nameCn}」`);
            } else {
                // 如果API获取失败，创建基础条目
                const anime = {
                    id: Date.now(),
                    name: name,
                    nameCn: name,
                    cover: '',
                    score: 0,
                    summary: '暂无简介，等待更新',
                    tags: [],
                    epsCount: 0,
                    airDate: '未知',
                    platform: '手动添加',
                    addedAt: new Date().toISOString()
                };
                myAnimeList.unshift(anime);
                saveData();
                renderList();
                selectAnime(anime.id);
                input.value = '';
                showToast('已添加，信息将在下次同步时更新');
            }

            btn.disabled = false;
            btn.textContent = '+';
        }

        // 回车添加
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addAnime();
        });

        // 删除动漫
        function deleteAnime(id, e) {
            e.stopPropagation();
            myAnimeList = myAnimeList.filter(a => a.id !== id);
            delete watchedEpisodes[id];
            saveData();
            renderList();
            
            if (currentAnimeId === id) {
                currentAnimeId = null;
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎬</div>
                        <h3>输入动漫名称开始追更</h3>
                        <p>支持自动获取封面、评分、简介等信息</p>
                    </div>
                `;
            }
            showToast('已移除');
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('myAnimeList', JSON.stringify(myAnimeList));
            localStorage.setItem('watchedEpisodes', JSON.stringify(watchedEpisodes));
        }

        // 渲染列表
        function renderList() {
            const list = document.getElementById('animeList');
            
            if (myAnimeList.length === 0) {
                list.innerHTML = `
                    <div style="padding: 40px 20px; text-align: center; color: #444;">
                        <div style="font-size: 32px; margin-bottom: 12px; opacity: 0.3;">📺</div>
                        <div style="font-size: 13px;">暂无追更列表</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = myAnimeList.map(anime => {
                const watched = watchedEpisodes[anime.id] || [];
                const watchedCount = watched.length;
                const isActive = anime.id === currentAnimeId;
                
                return `
                    <div class="anime-item ${isActive ? 'active' : ''}" onclick="selectAnime(${anime.id})">
                        <div class="anime-item-cover">
                            ${anime.cover 
                                ? `<img src="${anime.cover}" alt="${anime.nameCn}" onerror="this.parentElement.innerHTML='<span class=placeholder>🎬</span>'">`
                                : '<span class="placeholder">🎬</span>'
                            }
                        </div>
                        <div class="anime-item-info">
                            <div class="anime-item-name">${anime.nameCn}</div>
                            <div class="anime-item-ep">
                                ${anime.epsCount > 0 
                                    ? `已看 <strong>${watchedCount}</strong> / ${anime.epsCount} 集`
                                    : `已看 <strong>${watchedCount}</strong> 集`
                                }
                            </div>
                            ${anime.score > 0 ? `<div class="anime-item-score">★ ${anime.score}</div>` : ''}
                        </div>
                        <button class="anime-item-delete" onclick="deleteAnime(${anime.id}, event)" title="移除">×</button>
                    </div>
                `;
            }).join('');
        }

        // 选择动漫
        function selectAnime(id) {
            currentAnimeId = id;
            const anime = myAnimeList.find(a => a.id === id);
            if (!anime) return;

            renderList();
            renderDetail(anime);
        }

        // 渲染详情
        function renderDetail(anime) {
            const main = document.getElementById('mainContent');
            const watched = watchedEpisodes[anime.id] || [];
            
            // 生成集数列表（最多显示100集）
            const epsToShow = Math.min(anime.epsCount || 50, 100);
            let episodesHTML = '';
            if (epsToShow > 0) {
                episodesHTML = `
                    <div class="episodes-section">
                        <div class="section-title">📋 集数 <span style="font-size: 13px; color: #666; font-weight: 400;">点击标记已看</span></div>
                        <div class="episodes-grid">
                            ${Array.from({length: epsToShow}, (_, i) => i + 1).map(ep => `
                                <div class="episode-item ${watched.includes(ep) ? 'watched' : ''}" 
                                     onclick="toggleEpisode(${anime.id}, ${ep}, this)">
                                    ${ep}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            main.innerHTML = `
                <div class="anime-detail">
                    <div class="detail-header">
                        <div class="detail-cover">
                            ${anime.cover 
                                ? `<img src="${anime.cover}" alt="${anime.nameCn}" onerror="this.parentElement.innerHTML='<span class=placeholder>🎬</span>'">`
                                : '<span class="placeholder">🎬</span>'
                            }
                        </div>
                        <div class="detail-info">
                            <h1 class="detail-title">${anime.nameCn}</h1>
                            <div class="detail-original">${anime.name !== anime.nameCn ? anime.name : ''} · ${anime.airDate}</div>
                            
                            <div class="detail-stats">
                                ${anime.score > 0 ? `
                                    <div class="detail-stat">
                                        <div class="detail-stat-value">${anime.score}</div>
                                        <div class="detail-stat-label">评分</div>
                                    </div>
                                ` : ''}
                                <div class="detail-stat">
                                    <div class="detail-stat-value">${anime.epsCount || '—'}</div>
                                    <div class="detail-stat-label">总集数</div>
                                </div>
                                <div class="detail-stat">
                                    <div class="detail-stat-value">${watched.length}</div>
                                    <div class="detail-stat-label">已观看</div>
                                </div>
                            </div>

                            ${anime.tags.length > 0 ? `
                                <div class="detail-tags">
                                    ${anime.tags.map(tag => `<span class="detail-tag">${tag}</span>`).join('')}
                                </div>
                            ` : ''}

                            <div class="detail-summary">${anime.summary}</div>
                        </div>
                    </div>
                    ${episodesHTML}
                </div>
            `;
        }

        // 切换观看状态
        function toggleEpisode(animeId, episode, element) {
            if (!watchedEpisodes[animeId]) {
                watchedEpisodes[animeId] = [];
            }
            
            const idx = watchedEpisodes[animeId].indexOf(episode);
            if (idx > -1) {
                watchedEpisodes[animeId].splice(idx, 1);
                element.classList.remove('watched');
            } else {
                watchedEpisodes[animeId].push(episode);
                element.classList.add('watched');
            }
            
            saveData();
            renderList();
        }

        // 初始化
        renderList();
    </script>
</body>
</html>
